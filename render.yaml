services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: doctor-parser-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: MAPPLS_API_KEY
        sync: false
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false   # set to your frontend URL after deploy, e.g. https://doctor-parser.onrender.com

  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: web
    name: doctor-parser
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to https://doctor-parser-api.onrender.com after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
