name: CI evidence report

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ci-evidence-report-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Check out pull-request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ruff
        id: ruff
        shell: bash
        run: |
          mkdir -p ci-results/static
          python -m pip install --upgrade pip
          python -m pip install ruff

          set +e
          ruff check backend --output-format=json > ci-results/static/ruff-check.json
          check_status=$?
          ruff format --check backend > ci-results/static/ruff-format.txt 2>&1
          format_status=$?
          set -e

          {
            echo "ruff_check_status=$check_status"
            echo "ruff_format_status=$format_status"
          } > ci-results/static/status.env

          if [ "$check_status" -ne 0 ] || [ "$format_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload static-analysis evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-results
          path: ci-results/static/
          if-no-files-found: warn

  security-analysis:
    name: Security analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Check out pull-request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit
        shell: bash
        run: |
          mkdir -p ci-results/security
          python -m pip install --upgrade pip
          python -m pip install bandit

          set +e
          bandit -r backend/app -f json -o ci-results/security/bandit.json
          bandit_status=$?
          set -e

          echo "bandit_status=$bandit_status" > ci-results/security/status.env
          exit "$bandit_status"

      - name: Upload security-analysis evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-analysis-results
          path: ci-results/security/
          if-no-files-found: warn

  backend-tests:
    name: Backend unit and API tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out pull-request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pytest
        shell: bash
        run: |
          mkdir -p ci-results/tests
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          cd backend
          set +e
          PYTHONPATH=. pytest tests \
            --junitxml=../ci-results/tests/pytest.xml \
            | tee ../ci-results/tests/pytest-output.txt
          pytest_status=${PIPESTATUS[0]}
          set -e
          echo "pytest_status=$pytest_status" > ../ci-results/tests/status.env
          exit "$pytest_status"

      - name: Upload backend-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ci-results/tests/
          if-no-files-found: warn

  ai-targeted-tests:
    name: AI-generated targeted tests
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.pull_request.labels.*.name, 'ci-ai-report') &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read

    steps:
      - name: Check out pull-request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Generate targeted pytest tests from PR diff
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/targeted-test-generation.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral"]'

      - name: Verify generated-test scope
        shell: bash
        run: |
          status_file=/tmp/ai-targeted-worktree-status.txt
          git status --porcelain --untracked-files=all \
            > "$status_file"
          unexpected_changes=$(
            grep -vE '^\?\? ci-generated-tests/backend/test_pr_targeted\.py$' \
              "$status_file" || true
          )
          mkdir -p ci-results/ai-targeted-tests
          cp "$status_file" ci-results/ai-targeted-tests/worktree-status.txt
          if [ -n "$unexpected_changes" ]; then
            {
              echo "AI test generation modified files outside the allowed path."
              echo
              echo "$unexpected_changes"
            } > ci-results/ai-targeted-tests/scope-violation.txt
            exit 1
          fi

      - name: Run generated targeted tests
        shell: bash
        run: |
          mkdir -p ci-results/ai-targeted-tests
          if [ ! -f ci-generated-tests/backend/test_pr_targeted.py ]; then
            echo "No generated pytest file found." \
              > ci-results/ai-targeted-tests/pytest-output.txt
            exit 0
          fi

          set +e
          PYTHONPATH=backend pytest ci-generated-tests/backend/test_pr_targeted.py \
            --junitxml=ci-results/ai-targeted-tests/pytest.xml \
            | tee ci-results/ai-targeted-tests/pytest-output.txt
          pytest_status=${PIPESTATUS[0]}
          set -e

          if [ "$pytest_status" -eq 5 ] && \
             grep -q "collected 0 items" ci-results/ai-targeted-tests/pytest-output.txt; then
            {
              echo
              echo "No targeted tests were generated for this PR."
              echo "Treating pytest exit code 5 as success because zero collected tests is an explicit non-blocking outcome for AI-targeted test generation."
            } >> ci-results/ai-targeted-tests/pytest-output.txt
            pytest_status=0
          fi

          echo "pytest_status=$pytest_status" \
            > ci-results/ai-targeted-tests/status.env
          exit "$pytest_status"

      - name: Upload AI-targeted-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-targeted-test-results
          path: |
            ci-generated-tests/
            ci-results/ai-targeted-tests/
          if-no-files-found: warn

  ai-final-report:
    name: AI final reviewer report
    runs-on: ubuntu-latest
    needs:
      - static-analysis
      - security-analysis
      - backend-tests
      - ai-targeted-tests
    if: >-
      always() &&
      contains(github.event.pull_request.labels.*.name, 'ci-ai-report') &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out pull-request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Download CI evidence artifacts
        uses: actions/download-artifact@v4
        with:
          path: ci-evidence
          merge-multiple: false

      - name: Build final CI report
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/ci-final-report.md
          sandbox: read-only
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral"]'

      - name: Publish final CI report comment
        if: steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CI_FINAL_REPORT: ${{ steps.codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- ai-ci-final-report -->';
            const body = `${marker}\n${process.env.CI_FINAL_REPORT}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
