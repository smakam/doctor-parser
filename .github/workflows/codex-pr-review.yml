name: Codex action PR review

on:
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: codex-action-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'codex-action-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}

    steps:
      - name: Check out pull-request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Run read-only Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr-review.md
          sandbox: read-only
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral", "--output-schema", ".github/codex/schemas/pr-review.schema.json"]'

  publish:
    needs: review
    if: needs.review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # Load publisher code from the trusted base commit, never from PR code in
      # a job that holds pull-request write permission.
      - name: Check out trusted review publisher
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Publish native Codex action review
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW_JSON: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { publishReview } = require(
              './.github/codex/scripts/publish-inline-review.cjs'
            );
            await publishReview({
              github,
              context,
              core,
              reviewJson: process.env.CODEX_REVIEW_JSON,
            });
